<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindSolve</title>

<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">MindSolve</div>

    <div class="search-container">
        <input id="searchBar" class="search-bar" placeholder="Search problems...">
        <div id="searchResultsBox" class="search-results-box">
            <ul id="searchResults"></ul>
        </div>
    </div>
</nav>

<div class="wrapper">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Categories</h3>

        <ul class="category-list">
            <li onclick="toggleCategory(this, 'study')">
                📚 Study
                <ul class="sub-list"></ul>
            </li>

            <li onclick="toggleCategory(this, 'career')">
                💼 Career
                <ul class="sub-list"></ul>
            </li>

            <li onclick="toggleCategory(this, 'productivity')">
                🧠 Productivity
                <ul class="sub-list"></ul>
            </li>

            <li onclick="toggleCategory(this, 'health')">
                🩺 Health
                <ul class="sub-list"></ul>
            </li>
        </ul>
    </aside>

    <!-- CONTENT -->
    <main class="content">

        <div class="section">
            <h2>Enter Your Problem</h2>

            <textarea id="problemInput"
            placeholder="Example: I can't focus while studying..."></textarea>

            <p id="message"></p>

            <button id="submitBtn">Submit Problem</button>
        </div>

        <div class="section">
            <h2>🧠 Suggested Solutions</h2>
            <ul id="suggestions"></ul>
        </div>

        <div class="section">
            <h2>🔍 Similar Problems</h2>
            <ul id="similarProblems"></ul>
        </div>

        <div class="section">
            <h2>📜 Recent Problems</h2>
            <ul id="problemFeed"></ul>
        </div>

    </main>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
