<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MindSolve</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/static/favicon.ico">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🧠 MindSolve</div>

    <div class="search-container">
        <input type="text" id="searchBar" class="search-bar" placeholder="Search problems...">
        <div id="searchResultsBox">
            <ul id="searchResults"></ul>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="wrapper">

    <!-- SIDEBAR -->
    <ul class="sidebar">
        <li onclick="toggleCategory(this, 'study')">📚 Study<div class="sub-list"></div></li>
        <li onclick="toggleCategory(this, 'career')">💼 Career<div class="sub-list"></div></li>
        <li onclick="toggleCategory(this, 'productivity')">⏱ Productivity<div class="sub-list"></div></li>
        <li onclick="toggleCategory(this, 'health')">🩺 Health<div class="sub-list"></div></li>
    </ul>

    <!-- CONTENT -->
    <main class="content">

        <!-- INPUT -->
        <div class="section">
            <h2>Enter Your Problem</h2>
            <textarea id="problemInput" placeholder="Example: I can't focus while studying..."></textarea>
            <button id="submitBtn">Submit Problem</button>
            <p id="message"></p>
        </div>

        <!-- SUGGESTIONS -->
        <div class="section">
            <h2>💡 Suggested Solutions</h2>
            <ul id="suggestions"></ul>
        </div>

        <!-- SIMILAR -->
        <div class="section">
            <h2>🔎 Similar Problems</h2>
            <ul id="similarProblems"></ul>
        </div>

        <!-- RECENT -->
        <div class="section">
            <h2>🧾 Recent Problems</h2>
            <ul id="problemFeed"></ul>
        </div>

        <!-- MEMORY -->
        <div class="section">
            <h2>🧠 Your Activity</h2>
            <ul id="memoryList"></ul>
        </div>

        <!-- TRENDING -->
        <div class="section">
            <h2>📈 Trending Problems</h2>
            <ul id="trendingList"></ul>
        </div>

    </main>

</div>

<script src="/static/app.js"></script>

</body>
</html>
